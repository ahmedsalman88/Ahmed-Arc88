<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmed Salman Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #87CEEB;
            /* Sky blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            /* Prevent zooming/scrolling on mobile */
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .screen {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            pointer-events: auto;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: scale(1);
        }

        .hidden {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none !important;
            display: none !important;
        }

        h1 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 18px;
        }

        button {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(76, 175, 80, 0.3);
            transition: transform 0.1s, box-shadow 0.2s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 6px rgba(76, 175, 80, 0.3);
        }

        button:hover {
            box-shadow: 0 8px 15px rgba(76, 175, 80, 0.4);
        }

        #score-display {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            font-size: 60px;
            font-weight: 900;
            color: white;
            text-shadow: 3px 3px 0 #2c3e50, -3px -3px 0 #2c3e50, 3px -3px 0 #2c3e50, -3px 3px 0 #2c3e50, 0px 5px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
            pointer-events: none;
            font-family: 'Courier New', Courier, monospace;
        }

        .stat-box {
            background: #ecf0f1;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 24px;
            color: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="score-display" class="hidden">0</div>

    <div id="ui-layer">
        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <h1>Ahmed Salman Game</h1>
            <p>Tap or click to flap and avoid the pipes!</p>
            <button id="start-btn">Start Game</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen hidden">
            <h1>Game Over!</h1>
            <div class="stat-box">Score: <span id="final-score">0</span></div>
            <div class="stat-box">Best: <span id="best-score">0</span></div>
            <button id="restart-btn" style="margin-top: 15px;">Play Again</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const scoreDisplay = document.getElementById('score-display');
        const finalScoreEl = document.getElementById('final-score');
        const bestScoreEl = document.getElementById('best-score');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        // Game Settings & State
        let frames = 0;
        let score = 0;
        let bestScore = localStorage.getItem('ahmed_game_best') || 0;
        let state = 'start'; // 'start', 'playing', 'gameover'
        let animationId;

        // Audio Context for synthesized sounds
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            try {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                if (type === 'jump') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'score') {
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                    oscillator.frequency.setValueAtTime(600, audioCtx.currentTime + 0.05);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'crash') {
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.3);
                }
            } catch (e) {
                console.error("Audio error", e);
            }
        }

        // Resize handling
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (bird.y > canvas.height) bird.y = canvas.height - bird.radius;
        }
        window.addEventListener('resize', resize);
        resize();

        // Bird Object
        const bird = {
            x: canvas.width * 0.2, // 20% from left
            y: canvas.height / 2,
            radius: 15,
            velocity: 0,
            gravity: 0.3,
            jumpStrength: -6,
            color: '#f1c40f', // Sun flower yellow

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Rotation based on velocity
                let rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.velocity * 0.1)));
                ctx.rotate(rotation);

                // Body
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#34495e';
                ctx.stroke();

                // Wing
                ctx.beginPath();
                ctx.ellipse(-5, 2, 8, 5, -Math.PI / 6, 0, Math.PI * 2);
                ctx.fillStyle = '#f39c12';
                ctx.fill();
                ctx.stroke();

                // Eye
                ctx.beginPath();
                ctx.arc(5, -5, 4, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(6, -5, 2, 0, Math.PI * 2);
                ctx.fillStyle = 'black';
                ctx.fill();

                // Beak
                ctx.beginPath();
                ctx.moveTo(10, 0);
                ctx.lineTo(20, 2);
                ctx.lineTo(10, 6);
                ctx.fillStyle = '#e67e22';
                ctx.fill();
                ctx.stroke();

                ctx.restore();
            },

            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;

                // Ground Collision
                if (this.y + this.radius >= canvas.height) {
                    this.y = canvas.height - this.radius;
                    gameOver();
                }

                // Ceiling Collision
                if (this.y - this.radius <= 0) {
                    this.y = this.radius;
                    this.velocity = 0;
                }
            },

            jump() {
                this.velocity = this.jumpStrength;
                playSound('jump');
            },

            reset() {
                this.x = canvas.width * 0.2;
                this.y = canvas.height / 2;
                this.velocity = 0;
            }
        };

        // Pipes Object
        const pipes = {
            items: [],
            width: 60,
            baseGap: 160,
            minGap: 100,
            dx: 3,

            draw() {
                for (let i = 0; i < this.items.length; i++) {
                    let p = this.items[i];

                    // Main pipe color
                    const pipeGradient = ctx.createLinearGradient(p.x, 0, p.x + this.width, 0);
                    pipeGradient.addColorStop(0, '#2ecc71');
                    pipeGradient.addColorStop(0.5, '#27ae60');
                    pipeGradient.addColorStop(1, '#2ecc71');

                    ctx.fillStyle = pipeGradient;
                    ctx.strokeStyle = '#2c3e50';
                    ctx.lineWidth = 2;

                    // Top pipe
                    ctx.fillRect(p.x, 0, this.width, p.top);
                    ctx.strokeRect(p.x, 0, this.width, p.top);

                    // Bottom pipe
                    ctx.fillRect(p.x, canvas.height - p.bottom, this.width, p.bottom);
                    ctx.strokeRect(p.x, canvas.height - p.bottom, this.width, p.bottom);

                    // Pipe caps
                    const capHeight = 25;
                    const capOvershoot = 4;

                    ctx.fillRect(p.x - capOvershoot, p.top - capHeight, this.width + (capOvershoot * 2), capHeight);
                    ctx.strokeRect(p.x - capOvershoot, p.top - capHeight, this.width + (capOvershoot * 2), capHeight);

                    ctx.fillRect(p.x - capOvershoot, canvas.height - p.bottom, this.width + (capOvershoot * 2), capHeight);
                    ctx.strokeRect(p.x - capOvershoot, canvas.height - p.bottom, this.width + (capOvershoot * 2), capHeight);
                }
            },

            update() {
                // Progressive Difficulty
                let speedMultiplier = 1 + (score * 0.05);
                let currentDx = this.dx * speedMultiplier;
                if (currentDx > 7) currentDx = 7; // Max speed

                let currentGap = this.baseGap - (score * 2);
                if (currentGap < this.minGap) currentGap = this.minGap;

                // Add new pipes based on distance rather than frames to keep spacing consistent
                let pipeSpacing = 300 + (currentDx * 10);

                if (this.items.length === 0 || (canvas.width - this.items[this.items.length - 1].x) >= pipeSpacing) {
                    let minPipeHeight = 50;
                    let maxPos = canvas.height - minPipeHeight - currentGap;
                    let topHeight = Math.max(minPipeHeight, Math.random() * maxPos);

                    this.items.push({
                        x: canvas.width,
                        top: topHeight,
                        bottom: canvas.height - (topHeight + currentGap),
                        passed: false
                    });
                }

                for (let i = 0; i < this.items.length; i++) {
                    let p = this.items[i];
                    p.x -= currentDx;

                    // Hitbox adjustments for bird shape
                    let hitRadius = bird.radius * 0.8;
                    let birdLeft = bird.x - hitRadius;
                    let birdRight = bird.x + hitRadius;
                    let birdTop = bird.y - hitRadius;
                    let birdBottom = bird.y + hitRadius;

                    let pipeLeft = p.x;
                    let pipeRight = p.x + this.width;

                    // Collision Detection
                    if (birdRight > pipeLeft && birdLeft < pipeRight) {
                        if (birdTop < p.top || birdBottom > canvas.height - p.bottom) {
                            gameOver();
                        }
                    }

                    // Score Update
                    if (p.x + this.width < bird.x - bird.radius && !p.passed) {
                        score++;
                        p.passed = true;
                        scoreDisplay.innerText = score;

                        // Add a little pop animation to score
                        scoreDisplay.style.transform = 'scale(1.2)';
                        setTimeout(() => { scoreDisplay.style.transform = 'scale(1)'; }, 100);

                        playSound('score');
                    }

                    // Remove off-screen pipes
                    if (p.x + this.width < -100) {
                        this.items.shift();
                        i--;
                    }
                }
            },

            reset() {
                this.items = [];
            }
        };

        // Environment (Background elements)
        const environment = {
            clouds: [],
            ground: { y: 0, height: 40 },
            init() {
                for (let i = 0; i < 6; i++) {
                    this.clouds.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * (canvas.height * 0.6),
                        size: 30 + Math.random() * 50,
                        speed: 0.2 + Math.random() * 0.5
                    });
                }
            },
            draw() {
                // Clouds
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                for (let c of this.clouds) {
                    ctx.beginPath();
                    ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
                    ctx.arc(c.x + c.size * 0.5, c.y - c.size * 0.2, c.size * 0.8, 0, Math.PI * 2);
                    ctx.arc(c.x + c.size, c.y, c.size * 0.9, 0, Math.PI * 2);
                    ctx.fill();

                    if (state === 'playing') {
                        c.x -= c.speed;
                        if (c.x + c.size * 2 < 0) {
                            c.x = canvas.width + c.size;
                            c.y = Math.random() * (canvas.height * 0.6);
                        }
                    }
                }
            }
        };
        environment.init();

        function drawBackground() {
            // Gradient Sky
            let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#3498db');
            grad.addColorStop(1, '#ecf0f1');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            environment.draw();
        }

        // Main Game Loop
        function loop() {
            if (state !== 'playing') return;

            drawBackground();

            pipes.draw();
            pipes.update();

            bird.draw();
            bird.update();

            frames++;
            animationId = requestAnimationFrame(loop);
        }

        // Controls
        function inputAction(e) {
            if (e.cancelable) e.preventDefault(); // Prevent double firing on touch

            if (state === 'playing') {
                bird.jump();
            } else if (state === 'start') {
                // We handle this via button now to ensure audio context resumes properly
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                if (state === 'playing') {
                    bird.jump();
                } else if (state === 'start' || state === 'gameover') {
                    // Prevent spacebar from clicking buttons if focused
                    e.preventDefault();
                    if (state === 'start') startBtn.click();
                    if (state === 'gameover') restartBtn.click();
                }
            }
        });

        // Touch and mouse events for gameplay
        canvas.addEventListener('mousedown', inputAction);
        canvas.addEventListener('touchstart', inputAction, { passive: false });

        // Game Flow Functions
        function startGame() {
            initAudio();
            state = 'playing';
            score = 0;
            frames = 0;
            scoreDisplay.innerText = score;
            scoreDisplay.classList.remove('hidden');
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            bird.reset();
            pipes.reset();
            bird.jump(); // Initial jump

            loop();
        }

        function gameOver() {
            state = 'gameover';
            playSound('crash');
            cancelAnimationFrame(animationId);

            // Final render to show crash position
            drawBackground();
            pipes.draw();
            bird.draw();

            scoreDisplay.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');

            finalScoreEl.innerText = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('ahmed_game_best', bestScore);
            }
            bestScoreEl.innerText = bestScore;
        }

        // Button Listeners
        startBtn.addEventListener('click', startGame);
        startBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startBtn.click(); }, { passive: false });

        restartBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('touchstart', (e) => { e.preventDefault(); restartBtn.click(); }, { passive: false });

        // Initial Draw
        drawBackground();
        bird.draw();

    </script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <script>
        const USDC_ADDRESS = "0x2F96De3A33379D408e0108A7C637A6D869371077"; // عنوان USDC على Arc Testnet
        const ADMIN_WALLET = "عنوان_محفظتك_هنا"; // حط عنوان محفظتك اللي هتستلم الـ 0.1 USDC
        const CHAIN_ID = '0x4CE816'; // Arc Testnet (5042002)

        let provider, signer, account;

        // 1. وظيفة ربط المحفظة والتأكد من الشبكة
        async function connectWallet() {
            if (window.ethereum) {
                try {
                    // طلب تبديل الشبكة لـ Arc Testnet فوراً
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: CHAIN_ID }],
                    });

                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    account = accounts[0];
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();

                    document.getElementById('connectBtn').innerText = "Connected: " + account.substring(0, 6) + "...";
                    console.log("✅ Connected to Arc Testnet");
                } catch (error) {
                    alert("Please switch to Arc Testnet!");
                }
            } else {
                alert("Please install MetaMask!");
            }
        }

        // 2. وظيفة دفع 0.1 USDC قبل بدء اللعبة
        async function payToPlay() {
            if (!account) { alert("Connect wallet first!"); return; }

            try {
                const usdcContract = new ethers.Contract(
                    USDC_ADDRESS,
                    ["function transfer(address to, uint256 amount) public returns (bool)"],
                    signer
                );

                console.log("⏳ Processing payment of 0.1 USDC...");
                const amount = ethers.utils.parseUnits("0.1", 6); // USDC لديه 6 أصفار
                const tx = await usdcContract.transfer(ADMIN_WALLET, amount);

                await tx.wait(); // انتظار تأكيد المعاملة
                console.log("✅ Payment Successful!");
                startGame(); // الدالة اللي بتشغل الثعبان فعلياً
            } catch (error) {
                console.log("❌ Payment Failed", error);
                alert("Payment failed or rejected!");
            }
        }

        // اربط الأزرار بالكود
        document.getElementById('connectBtn').onclick = connectWallet;
        document.getElementById('playBtn').onclick = payToPlay;
    </script>
</body>

</html>
